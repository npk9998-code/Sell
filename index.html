<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="عقارات">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<title>مدير العروض العقارية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#f59e0b;--gold-d:#d97706;--gold-l:#fbbf24;
  --bg:#0f172a;--surf:#1e293b;--surf2:#0d1117;--surf3:#162032;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --text:#f1f5f9;--muted:#94a3b8;--dim:#475569;
  --green:#22c55e;--red:#ef4444;--blue:#3b82f6;--purple:#a855f7;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html{height:100%;-webkit-text-size-adjust:100%}
body{margin:0;font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100%}
input,select,textarea{font-size:16px!important;font-family:'Tajawal',sans-serif}

@media(max-width:639px){
  body{position:fixed;width:100%;top:0;left:0;right:0;bottom:0;overflow:hidden}
  #app{height:100%;overflow:hidden}
  .scroll{overflow-y:auto;-webkit-overflow-scrolling:touch}
}
@media(min-width:640px){
  body{padding:calc(var(--st)+16px) 16px calc(var(--sb)+16px);background:#060d1a}
  #app{border-radius:24px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.7)}
  .scroll{overflow-y:auto;max-height:calc(100vh - 280px)}
}

#app{display:flex;flex-direction:column;width:100%;max-width:680px;margin:0 auto;background:var(--bg);position:relative}

/* Header */
.hdr{background:linear-gradient(160deg,#1a2744 0%,#0f172a 100%);padding:calc(var(--st)+10px) 14px 10px;border-bottom:1px solid rgba(245,158,11,.15);flex-shrink:0}
.hdr-row{display:flex;align-items:center;gap:10px}
.hdr-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--gold),var(--gold-d));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;box-shadow:0 4px 16px rgba(245,158,11,.35)}
.hdr-title{font-size:15px;font-weight:900;color:var(--text);line-height:1.2}
.hdr-sub{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:5px;margin-top:2px}
.sdot{width:6px;height:6px;border-radius:50%;background:#22c55e;flex-shrink:0}
.hdr-badge{background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.4);color:#fca5a5;font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px;cursor:pointer;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* Stats bar */
.stats{display:flex;gap:6px;margin-top:10px;overflow-x:auto;padding-bottom:1px;scrollbar-width:none}
.stats::-webkit-scrollbar{display:none}
.stat{flex:0 0 auto;border-radius:10px;padding:6px 12px;text-align:center;border:1px solid;min-width:60px;cursor:pointer;transition:transform .13s,opacity .13s}
.stat:active{transform:scale(.92)}
.stat.on{outline:2px solid var(--gold);outline-offset:1px}
.stat-n{font-size:19px;font-weight:900;line-height:1}
.stat-l{font-size:9px;color:var(--muted);margin-top:1px}

/* Scroll */
.scroll{flex:1;overscroll-behavior:contain;padding:11px 12px 6px;scrollbar-width:none}
.scroll::-webkit-scrollbar{display:none}

/* Tabs */
.tabs{display:flex;background:var(--surf2);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:var(--sb)}
.tab{flex:1;padding:8px 0 6px;border:none;background:transparent;color:var(--dim);font-size:10px;font-family:'Tajawal',sans-serif;cursor:pointer;font-weight:700;border-top:2.5px solid transparent;transition:all .18s;touch-action:manipulation;-webkit-user-select:none;user-select:none;position:relative}
.tab.on{color:var(--gold);border-top-color:var(--gold)}
.tab-ic{font-size:18px;display:block;margin-bottom:1px}
.tab-badge{position:absolute;top:5px;right:calc(50% - 18px);background:#ef4444;color:#fff;font-size:9px;font-weight:900;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--surf2)}

/* Inputs */
.inp{width:100%;padding:11px 12px;border-radius:11px;border:1.5px solid #2a3548;background:var(--surf2);color:var(--text);font-size:16px;font-family:'Tajawal',sans-serif;-webkit-appearance:none;outline:none;transition:border-color .18s,box-shadow .18s}
.inp:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(245,158,11,.12)}
select.inp{cursor:pointer}
textarea.inp{resize:vertical}
.lbl{display:block;color:var(--muted);font-size:11px;margin-bottom:4px;font-weight:700}
.field{margin-bottom:12px}
.dual{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.triple{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}

/* Buttons */
.btn{border:none;border-radius:11px;padding:12px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Tajawal',sans-serif;transition:all .15s;-webkit-user-select:none;user-select:none;touch-action:manipulation;width:100%;display:block}
.btn:active{transform:scale(.96)}
.b-gold{background:linear-gradient(135deg,var(--gold),var(--gold-d));color:#fff;box-shadow:0 4px 16px rgba(245,158,11,.25)}
.b-red{background:linear-gradient(135deg,#dc2626,#991b1b);color:#fff}
.b-ghost{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--border)}
.b-green{background:linear-gradient(135deg,#059669,#065f46);color:#fff}
.b-blue{background:linear-gradient(135deg,#2563eb,#1e40af);color:#fff}
.b-purple{background:linear-gradient(135deg,#7c3aed,#5b21b6);color:#fff}
.b-teal{background:linear-gradient(135deg,#0891b2,#0e7490);color:#fff}
.b-orange{background:linear-gradient(135deg,#ea580c,#c2410c);color:#fff}
.b-sm{padding:8px 12px;font-size:12px;border-radius:9px;width:auto;display:inline-block}

/* Chip */
.chip{display:inline-block;padding:3px 9px;border-radius:7px;font-size:11px;font-weight:800;color:#fff}

/* Direction buttons */
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.dbtn{border-radius:11px;padding:11px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Tajawal',sans-serif;transition:all .15s;touch-action:manipulation;border-width:2px;border-style:solid;text-align:center}
.dbtn:active{transform:scale(.95)}
.dbtn.off-state{opacity:.5}

/* Type buttons */
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.tbtn{border-radius:10px;padding:10px 5px;font-size:12px;font-weight:800;cursor:pointer;font-family:'Tajawal',sans-serif;transition:all .15s;touch-action:manipulation;border:2px solid #2a3548;background:rgba(255,255,255,.03);color:var(--muted);text-align:center}
.tbtn.on{border-color:var(--gold);background:rgba(245,158,11,.14);color:var(--gold)}
.tbtn.off-state{opacity:.5}
.tbtn:active{transform:scale(.94)}

/* Filter pills */
.filter-row{display:flex;gap:5px;margin-bottom:9px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.fpill{flex:0 0 auto;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:800;border:1.5px solid #2a3548;background:rgba(255,255,255,.03);color:var(--muted);cursor:pointer;font-family:'Tajawal',sans-serif;touch-action:manipulation;transition:all .15s}
.fpill.on{background:rgba(245,158,11,.15);border-color:var(--gold);color:var(--gold)}
.fpill:active{transform:scale(.93)}

/* Card */
.card{border-radius:14px;padding:12px 13px;margin-bottom:8px;border-width:1.5px;border-style:solid;cursor:pointer;transition:transform .13s,filter .13s;-webkit-user-select:none;user-select:none;touch-action:manipulation;position:relative}
.card:active{transform:scale(.985);filter:brightness(.87)}
.card-pending{border-color:#f59e0b!important;background:rgba(245,158,11,.06)!important}

/* Inbox card */
.inbox-card{border-radius:14px;padding:13px 14px;margin-bottom:8px;background:var(--surf3);border:1.5px solid var(--border2);position:relative}
.inbox-badge{position:absolute;top:10px;left:13px;background:#f59e0b;color:#000;font-size:9px;font-weight:900;padding:2px 7px;border-radius:10px}

/* Overlay / Sheet */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fIn .2s ease}
@keyframes fIn{from{opacity:0}to{opacity:1}}
.sheet{background:var(--surf);border-radius:22px 22px 0 0;width:100%;max-width:680px;padding:20px 16px;padding-bottom:calc(20px + var(--sb));max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;animation:sUp .22s ease}
.sheet::-webkit-scrollbar{display:none}
@keyframes sUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.sheet-handle{width:36px;height:4px;background:var(--dim);border-radius:2px;margin:0 auto 16px}

/* Toast */
.toast{position:fixed;top:calc(var(--st)+12px);left:50%;transform:translateX(-50%);z-index:999;color:#fff;padding:9px 18px;border-radius:12px;font-weight:800;font-size:12px;font-family:'Tajawal',sans-serif;box-shadow:0 6px 24px rgba(0,0,0,.55);white-space:nowrap;max-width:90vw;animation:tIn .22s ease}
@keyframes tIn{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}

/* Detail rows */
.det-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.det-k{color:var(--dim);font-size:12px}
.det-v{color:var(--text);font-size:12px;font-weight:700;max-width:58%;text-align:left;word-break:break-all}
.act-row{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.act-row .btn{flex:1;min-width:76px}

/* Search */
.srow{display:flex;gap:7px;margin-bottom:9px}
.swrap{flex:1;position:relative}
.sic{position:absolute;right:11px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:13px;pointer-events:none}
.sinp{padding-right:34px}

/* Empty */
.empty{text-align:center;color:var(--dim);padding:50px 20px}
.e-ic{font-size:46px;margin-bottom:10px}
.e-t{font-size:14px;font-weight:800;color:var(--muted)}
.e-s{color:var(--dim);font-size:11px;margin-top:4px}

/* Misc */
.sec-title{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:900;color:var(--text);margin-bottom:14px}
.form-note{text-align:center;color:var(--dim);font-size:10px;margin-top:12px}
.active-filters{display:flex;gap:5px;align-items:center;margin-bottom:7px;flex-wrap:wrap}
.af-tag{background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.35);color:var(--gold);font-size:10px;font-weight:800;padding:2px 9px;border-radius:20px;display:flex;align-items:center;gap:3px}
.af-x{cursor:pointer;font-size:12px;line-height:1}

/* Filter panel */
.filter-panel{background:var(--surf3);border:1px solid var(--border2);border-radius:14px;padding:13px;margin-bottom:10px}
.filter-panel-title{font-size:11px;font-weight:800;color:var(--muted);margin-bottom:8px}
.range-row{display:flex;gap:7px;align-items:center}
.range-row .inp{text-align:center}
.range-sep{color:var(--dim);font-size:11px;flex-shrink:0}

/* Negotiable toggle */
.neg-toggle{display:flex;align-items:center;gap:9px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:10px;padding:10px 12px;cursor:pointer;transition:all .15s}
.neg-toggle.on{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.4)}
.neg-dot{width:20px;height:20px;border-radius:6px;border:2px solid #2a3548;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s;flex-shrink:0}
.neg-toggle.on .neg-dot{background:#22c55e;border-color:#22c55e}
.neg-label{font-size:12px;font-weight:800;color:var(--muted)}
.neg-toggle.on .neg-label{color:#22c55e}

/* Sort bar */
.sort-bar{display:flex;gap:6px;margin-bottom:9px;overflow-x:auto;scrollbar-width:none}
.sort-bar::-webkit-scrollbar{display:none}
.sort-btn{flex:0 0 auto;padding:5px 11px;border-radius:8px;font-size:11px;font-weight:800;border:1.5px solid #2a3548;background:rgba(255,255,255,.03);color:var(--dim);cursor:pointer;font-family:'Tajawal',sans-serif;white-space:nowrap;transition:all .15s}
.sort-btn.on{background:rgba(245,158,11,.12);border-color:var(--gold);color:var(--gold)}
.sort-btn:active{transform:scale(.93)}

/* City select */
.city-select{width:100%;padding:11px 12px;border-radius:11px;border:1.5px solid #2a3548;background:var(--surf2);color:var(--text);font-size:16px;font-family:'Tajawal',sans-serif;-webkit-appearance:none;outline:none;cursor:pointer;transition:border-color .18s}
.city-select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(245,158,11,.12)}

/* Inbox link box */
.link-box{background:var(--surf2);border:1.5px dashed rgba(245,158,11,.4);border-radius:12px;padding:12px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.link-url{flex:1;font-size:11px;color:var(--muted);word-break:break-all;direction:ltr;text-align:right;line-height:1.5}
.link-copy-btn{flex-shrink:0;padding:8px 12px;border-radius:9px;background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);color:var(--gold);font-size:11px;font-weight:800;cursor:pointer;font-family:'Tajawal',sans-serif;white-space:nowrap;transition:all .15s}
.link-copy-btn:active{transform:scale(.93)}

/* Date badge */
.date-badge{font-size:9px;color:var(--dim);display:flex;align-items:center;gap:3px}

/* Stats enhanced */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.kpi{background:var(--surf2);border:1px solid var(--border);border-radius:12px;padding:13px;text-align:center}
.kpi-n{font-size:22px;font-weight:900;line-height:1;color:var(--gold)}
.kpi-l{font-size:10px;color:var(--muted);margin-top:3px;line-height:1.3}
.bar-row{display:flex;align-items:center;gap:9px;padding:8px 12px;border-bottom:1px solid var(--border)}
.bar-track{flex:1;background:rgba(255,255,255,.05);border-radius:5px;height:7px;overflow:hidden}
.bar-fill{height:100%;border-radius:5px;transition:width .6s ease}

/* Whatsapp share */
.wa-btn{background:linear-gradient(135deg,#25d366,#128c7e);color:#fff}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-row">
      <div class="hdr-icon">🏠</div>
      <div style="flex:1;min-width:0">
        <div class="hdr-title">مدير العروض العقارية</div>
        <div class="hdr-sub">
          <span class="sdot" id="sdot"></span>
          <span id="stxt">جاري التحميل...</span>
        </div>
      </div>
      <div id="inboxBadgeHdr" style="display:none" class="hdr-badge" onclick="goTab(3)">📥 <span id="inboxCount">0</span> جديد</div>
    </div>
    <div class="stats" id="statsRow"></div>
  </div>
  <div class="scroll" id="scroll"></div>
  <div class="tabs">
    <button class="tab on" id="t0" onclick="goTab(0)"><span class="tab-ic">📋</span>العروض</button>
    <button class="tab" id="t1" onclick="goTab(1)"><span class="tab-ic">➕</span>إضافة</button>
    <button class="tab" id="t3" onclick="goTab(3)" style="position:relative"><span class="tab-ic">📥</span>الوارد<span class="tab-badge" id="tabBadge" style="display:none">0</span></button>
    <button class="tab" id="t2" onclick="goTab(2)"><span class="tab-ic">📊</span>إحصاء</button>
  </div>
</div>

<div class="toast" id="toast" style="display:none"></div>

<!-- Delete overlay -->
<div class="overlay" id="delOverlay" style="display:none" onclick="closeOverlay('delOverlay')">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div style="text-align:center">
      <div style="font-size:44px;margin-bottom:8px">🗑️</div>
      <div style="font-size:15px;font-weight:900;margin-bottom:4px">حذف العرض؟</div>
      <div style="color:var(--muted);font-size:11px;margin-bottom:20px">لا يمكن التراجع عن هذا الإجراء</div>
      <div style="display:flex;gap:8px">
        <button class="btn b-red" onclick="confirmDel()">نعم، احذف</button>
        <button class="btn b-ghost" onclick="closeOverlay('delOverlay')">إلغاء</button>
      </div>
    </div>
  </div>
</div>

<!-- Detail overlay -->
<div class="overlay" id="detOverlay" style="display:none" onclick="closeOverlay('detOverlay')">
  <div class="sheet" id="detSheet" onclick="event.stopPropagation()"></div>
</div>

<!-- Import overlay -->
<div class="overlay" id="importOverlay" style="display:none" onclick="closeOverlay('importOverlay')">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div style="font-size:14px;font-weight:900;margin-bottom:5px">📥 استيراد ودمج بيانات</div>
    <div style="color:var(--muted);font-size:11px;margin-bottom:14px;line-height:1.6">اختر ملف JSON صادر من نفس التطبيق. ستُضاف العروض الجديدة دون حذف الحالية.</div>
    <label style="display:block;background:rgba(245,158,11,.07);border:2px dashed rgba(245,158,11,.3);border-radius:13px;padding:20px;text-align:center;cursor:pointer;margin-bottom:13px">
      <div style="font-size:30px;margin-bottom:5px">📂</div>
      <div style="color:var(--gold);font-weight:800;font-size:12px">اضغط لاختيار ملف JSON</div>
      <input type="file" accept=".json" style="display:none" onchange="doImport(this)">
    </label>
    <button class="btn b-ghost" onclick="closeOverlay('importOverlay')">إلغاء</button>
  </div>
</div>

<!-- City filter overlay -->
<div class="overlay" id="cityFilterOverlay" style="display:none" onclick="closeOverlay('cityFilterOverlay')">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div style="font-size:14px;font-weight:900;margin-bottom:14px">🏙️ تصفية حسب المدينة</div>
    <div id="cityFilterList"></div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn b-gold" onclick="closeOverlay('cityFilterOverlay')">تطبيق</button>
      <button class="btn b-ghost" onclick="filterCities=[];render();closeOverlay('cityFilterOverlay')">مسح الكل</button>
    </div>
  </div>
</div>

<!-- Inbox approve overlay -->
<div class="overlay" id="approveOverlay" style="display:none" onclick="closeOverlay('approveOverlay')">
  <div class="sheet" id="approveSheet" onclick="event.stopPropagation()"></div>
</div>

<script>
// ── Constants ────────────────────────────────────────────
const DC={
  'شمال':{bg:'#fef2f2',border:'#fca5a5',badge:'#ef4444',text:'#991b1b'},
  'جنوب':{bg:'#fefce8',border:'#fde047',badge:'#ca8a04',text:'#713f12'},
  'شرق': {bg:'#eff6ff',border:'#93c5fd',badge:'#2563eb',text:'#1e3a8a'},
  'غرب': {bg:'#f0fdf4',border:'#86efac',badge:'#16a34a',text:'#14532d'},
};
const DIRS=['شمال','جنوب','شرق','غرب'];
const TYPES=['أرض','فيلا','عمارة','شقة','محل'];
const CITIES=['الرياض','مكة المكرمة','المدينة المنورة','الشرقية','القصيم','حائل','تبوك','جازان','نجران','الباحة','الجوف','الحدود الشمالية','عسير'];
const KEY='realestate_v4';
const INBOX_KEY='realestate_inbox_v4';
const INSTALL_KEY='re_install_dismissed';

// ── State ────────────────────────────────────────────────
let offers=[],inbox=[],tab=0,editId=null,delId=null;
let search='',filterDirs=[],filterTypes=[],filterCities=[];
let priceMin='',priceMax='',areaMin='',areaMax='';
let sortBy='date',sortDir='desc';
let showFilterPanel=false;
let toastT=null;

const EF=()=>({direction:'',sellerName:'',sellerPhone:'',neighborhood:'',propertyType:'',area:'',streetWidth:'',price:'',notes:'',negotiable:false,city:'الرياض',createdAt:Date.now()});
let form=EF();

// ── Init ─────────────────────────────────────────────────
function init(){
  try{offers=JSON.parse(localStorage.getItem(KEY)||'[]');}catch(e){offers=[];}
  try{inbox=JSON.parse(localStorage.getItem(INBOX_KEY)||'[]');}catch(e){inbox=[];}
  render();

}

// ── Relative date ─────────────────────────────────────────
function relativeDate(ts){
  if(!ts) return '';
  const diff=Math.floor((Date.now()-ts)/1000);
  if(diff<60) return 'الآن';
  if(diff<3600) return 'منذ '+Math.floor(diff/60)+' دق';
  if(diff<86400) return 'منذ '+Math.floor(diff/3600)+' س';
  const d=Math.floor(diff/86400);
  if(d===1) return 'أمس';
  if(d<30) return 'منذ '+d+' يوم';
  if(d<365) return 'منذ '+Math.floor(d/30)+' شهر';
  return 'منذ '+Math.floor(d/365)+' سنة';
}

// ── Filters ───────────────────────────────────────────────
function toggleDirFilter(d){
  const i=filterDirs.indexOf(d);
  if(i>=0) filterDirs.splice(i,1); else filterDirs.push(d);
  if(tab!==0) goTab(0); else render();
}
function toggleTypeFilter(t){
  const i=filterTypes.indexOf(t);
  if(i>=0) filterTypes.splice(i,1); else filterTypes.push(t);
  render();
}
function toggleCityFilter(c){
  const i=filterCities.indexOf(c);
  if(i>=0) filterCities.splice(i,1); else filterCities.push(c);
  renderCityFilterList();
  render();
}
function clearFilters(){filterDirs=[];filterTypes=[];filterCities=[];priceMin='';priceMax='';areaMin='';areaMax='';sortBy='date';sortDir='desc';render();}

function filtered(){
  let res=[...offers];
  if(search.trim()){
    const q=search.trim();
    res=res.filter(o=>[o.sellerName,o.sellerPhone,o.direction,o.propertyType,o.neighborhood,o.city].some(v=>v&&v.includes(q)));
  }
  if(filterDirs.length)  res=res.filter(o=>filterDirs.includes(o.direction));
  if(filterTypes.length) res=res.filter(o=>filterTypes.includes(o.propertyType));
  if(filterCities.length)res=res.filter(o=>filterCities.includes(o.city||'الرياض'));
  if(priceMin) res=res.filter(o=>{const p=numVal(o.price);return p>=Number(priceMin);});
  if(priceMax) res=res.filter(o=>{const p=numVal(o.price);return p<=Number(priceMax);});
  if(areaMin)  res=res.filter(o=>Number(o.area)>=Number(areaMin));
  if(areaMax)  res=res.filter(o=>Number(o.area)<=Number(areaMax));
  // Sort
  res.sort((a,b)=>{
    let va,vb;
    if(sortBy==='price'){va=numVal(a.price);vb=numVal(b.price);}
    else if(sortBy==='area'){va=Number(a.area)||0;vb=Number(b.area)||0;}
    else {va=a.createdAt||0;vb=b.createdAt||0;}
    return sortDir==='asc'?va-vb:vb-va;
  });
  return res;
}

function numVal(v){return isNaN(Number(String(v||'').replace(/,/g,'')))?0:Number(String(v||'').replace(/,/g,''));}

    +'<div style="color:var(--muted);font-size:13px;margin-bottom:14px;direction:ltr;text-align:right">'+x(o.sellerPhone||'')+'</div>'
    +rows
    +'<div class="act-row">'
    +'<button class="btn b-gold" onclick="startEdit(\''+o.id+'\')">✏️ تعديل</button>'
    +'<button class="btn wa-btn" onclick="shareWhatsapp(\''+o.id+'\')">📱 واتساب</button>'
    +'<button class="btn b-purple" onclick="shareOffer(\''+o.id+'\')">📤 مشاركة</button>'
    +'<button class="btn b-red" onclick="openDel(\''+o.id+'\')">🗑️ حذف</button>'
    +'</div>';
  document.getElementById('detOverlay').style.display='flex';
}

// ── Share on WhatsApp ─────────────────────────────────────
function shareWhatsapp(id){
  const o=offers.find(z=>z.id===id)||inbox.find(z=>z.id===id); if(!o) return;
  const lines=[
    '🏠 *عرض عقاري*',
    o.city        ?'🏙️ المدينة: '+o.city:'',
    o.direction   ?'📍 الاتجاه: '+o.direction:'',
    o.neighborhood?'🏘️ الحي: '+o.neighborhood:'',
    o.sellerName  ?'👤 البائع: '+o.sellerName:'',
    o.sellerPhone ?'📞 الجوال: '+o.sellerPhone:'',
    o.propertyType?'🏗️ النوع: '+o.propertyType:'',
    o.area        ?'📐 المساحة: '+o.area+' م²'+(o.streetWidth?' | شارع '+o.streetWidth+'م':''):'',
    o.price       ?'💰 السعر: '+fp(o.price)+' ﷼'+(o.negotiable?' *(قابل للتفاوض)*':''):'',
    o.notes       ?'📝 '+o.notes:'',
  ].filter(Boolean).join('\n');
  const url='https://wa.me/?text='+encodeURIComponent(lines);
  window.open(url,'_blank');
  closeOverlay('detOverlay');
}

function shareOffer(id){
  const o=offers.find(z=>z.id===id); if(!o) return;
  const lines=buildShareText(o);
  if(navigator.share){navigator.share({title:'عرض عقاري',text:lines}).catch(()=>{});}
  else{copyText(lines);toast('✅ تم نسخ المعلومات');}
  closeOverlay('detOverlay');
}
function buildShareText(o){
  return ['🏠 عرض عقاري',
    o.city?'🏙️ '+o.city:'',
    o.direction?'📍 '+o.direction:'',
    o.neighborhood?'🏘️ '+o.neighborhood:'',
    o.sellerName?'👤 '+o.sellerName:'',
    o.sellerPhone?'📞 '+o.sellerPhone:'',
    o.propertyType?'🏗️ '+o.propertyType:'',
    o.area?'📐 '+o.area+' م²'+(o.streetWidth?' | شارع '+o.streetWidth+'م':''):'',
    o.price?'💰 '+fp(o.price)+' ﷼'+(o.negotiable?' (قابل للتفاوض)':''):'',
    o.notes?'📝 '+o.notes:'',
  ].filter(Boolean).join('\n');
}
function copyText(t){
  if(navigator.clipboard){navigator.clipboard.writeText(t).catch(()=>{});}
  else{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);}
}

// ── Edit / Delete ─────────────────────────────────────────
function startEdit(id){
  const o=offers.find(z=>z.id===id);if(!o) return;
  form={...o};editId=id;
  closeOverlay('detOverlay');goTab(1);
}
function openDel(id){delId=id;closeOverlay('detOverlay');document.getElementById('delOverlay').style.display='flex';}
function confirmDel(){offers=offers.filter(o=>o.id!==delId);toast('🗑️ تم الحذف','info');closeOverlay('delOverlay');save();}
function clearAll(){if(!confirm('⚠️ هل أنت متأكد من حذف جميع العروض؟'))return;offers=[];toast('🗑️ تم الحذف','info');save();}

// ── INBOX ─────────────────────────────────────────────────
function renderInbox(){
  const pending=inbox.filter(i=>i.status==='pending');
  const approved=inbox.filter(i=>i.status==='approved');
  const rejected=inbox.filter(i=>i.status==='rejected');

  let h='<div style="padding-bottom:18px"><div class="sec-title">📥 صندوق الوارد</div>';

  // رابط نموذج العميل
  const clientUrl=window.location.origin+window.location.pathname.replace('index.html','')+'client.html';
  h+='<div style="font-size:11px;font-weight:800;color:var(--muted);margin-bottom:6px">🔗 رابط نموذج العميل</div>'
    +'<div class="link-box">'
    +'<div class="link-url" id="clientLinkUrl">'+clientUrl+'</div>'
    +'<button class="link-copy-btn" onclick="copyClientLink()">📋 نسخ</button>'
    +'</div>';

  if(!inbox.length){
    h+='<div class="empty"><div class="e-ic">📭</div><div class="e-t">لا توجد طلبات</div><div class="e-s">شارك رابط النموذج مع العملاء</div></div>';
    return h+'</div>';
  }

  if(pending.length){
    h+='<div style="font-size:12px;font-weight:900;color:#fbbf24;margin-bottom:8px;display:flex;align-items:center;gap:6px">'
      +'<span style="background:#f59e0b;color:#000;border-radius:10px;padding:1px 8px;font-size:10px">'+pending.length+'</span>'
      +'طلبات معلقة</div>';
    pending.forEach(req=>{ h+=renderInboxCard(req,true); });
  }

  if(approved.length){
    h+='<div style="font-size:11px;font-weight:800;color:var(--green);margin:12px 0 7px;border-top:1px solid var(--border);padding-top:10px">✅ معتمدة ('+approved.length+')</div>';
    approved.forEach(req=>{ h+=renderInboxCard(req,false); });
  }

  if(rejected.length){
    h+='<div style="font-size:11px;font-weight:800;color:var(--red);margin:12px 0 7px;border-top:1px solid var(--border);padding-top:10px">❌ مرفوضة ('+rejected.length+')</div>';
    rejected.forEach(req=>{ h+=renderInboxCard(req,false); });
  }

  if(approved.length||rejected.length){
    h+='<button class="btn b-ghost" style="margin-top:10px;font-size:11px;padding:9px" onclick="clearProcessed()">🗑️ حذف المعتمدة والمرفوضة</button>';
  }

  return h+'</div>';
}

function renderInboxCard(req,isPending){
  const c=DC[req.direction]||{badge:'#64748b',border:'rgba(100,116,139,.3)',bg:'rgba(100,116,139,.05)'};
  const statusChip=req.status==='pending'
    ?'<span style="background:#f59e0b;color:#000;font-size:9px;font-weight:900;padding:2px 7px;border-radius:8px">جديد</span>'
    :req.status==='approved'
      ?'<span style="background:#15803d;color:#fff;font-size:9px;font-weight:900;padding:2px 7px;border-radius:8px">معتمد</span>'
      :'<span style="background:#991b1b;color:#fff;font-size:9px;font-weight:900;padding:2px 7px;border-radius:8px">مرفوض</span>';
  return '<div class="inbox-card" onclick="openApprove(\''+req.id+'\')" style="cursor:pointer">'
    +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px">'
    +'<div style="display:flex;gap:5px;flex-wrap:wrap">'
    +statusChip
    +(req.direction?'<span class="chip" style="background:'+c.badge+'">'+req.direction+'</span>':'')
    +(req.propertyType?'<span style="font-size:10px;background:rgba(255,255,255,.06);color:var(--muted);padding:2px 7px;border-radius:6px;font-weight:800">'+req.propertyType+'</span>':'')
    +(req.city?'<span style="font-size:10px;background:rgba(59,130,246,.1);color:#60a5fa;padding:2px 7px;border-radius:6px;font-weight:800">'+x(req.city)+'</span>':'')
    +'</div>'
    +'<div class="date-badge">'+relativeDate(req.createdAt)+'</div></div>'
    +'<div style="font-size:14px;font-weight:900;color:var(--text);margin-bottom:2px">'+x(req.sellerName||'—')+'</div>'
    +'<div style="display:flex;justify-content:space-between">'
    +'<span style="color:var(--muted);font-size:11px;direction:ltr">'+x(req.sellerPhone||'')+'</span>'
    +'<span style="color:var(--gold);font-size:12px;font-weight:900">'+(req.price?fp(req.price)+' ﷼':'—')+'</span></div>'
    +(req.neighborhood?'<div style="color:var(--dim);font-size:10px;margin-top:2px">📍 '+x(req.neighborhood)+'</div>':'')
    +'</div>';
}

function openApprove(id){
  const req=inbox.find(r=>r.id===id); if(!req) return;
  const c=DC[req.direction]||{badge:'#64748b'};
  const rows=[
    ['المدينة',req.city||'—'],['الاتجاه',req.direction||'—'],
    ['الحي',req.neighborhood||'—'],['نوع العقار',req.propertyType||'—'],
    ['المساحة',req.area?req.area+' م²':'—'],['عرض الشارع',req.streetWidth?req.streetWidth+' م':'—'],
    ['السعر',req.price?fp(req.price)+' ﷼'+(req.negotiable?' (قابل للتفاوض)':''):'—'],
    ['ملاحظات',req.notes||'—'],
  ].map(([k,v])=>'<div class="det-row"><span class="det-k">'+k+'</span><span class="det-v">'+x(v)+'</span></div>').join('');

  const btns=req.status==='pending'
    ?'<button class="btn b-green" onclick="approveInbox(\''+req.id+'\')">✅ اعتماد ونقل</button>'
     +'<button class="btn b-red" onclick="rejectInbox(\''+req.id+'\')">❌ رفض</button>'
     +'<button class="btn wa-btn" onclick="shareWhatsapp(\''+req.id+'\')">📱 واتساب</button>'
     +'<button class="btn b-ghost" onclick="closeOverlay(\'approveOverlay\')">إلغاء</button>'
    :'<button class="btn wa-btn" onclick="shareWhatsapp(\''+req.id+'\')">📱 واتساب</button>'
     +'<button class="btn b-ghost" onclick="closeOverlay(\'approveOverlay\')">إغلاق</button>';

  document.getElementById('approveSheet').innerHTML=
    '<div class="sheet-handle"></div>'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">'
    +'<div style="font-size:15px;font-weight:900">'+x(req.sellerName||'—')+'</div>'
    +'<button onclick="closeOverlay(\'approveOverlay\')" style="background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer">✕</button></div>'
    +'<div style="color:var(--muted);font-size:13px;margin-bottom:14px;direction:ltr;text-align:right">'+x(req.sellerPhone||'')+'</div>'
    +rows
    +'<div class="act-row" style="flex-wrap:wrap">'+btns+'</div>';
  document.getElementById('approveOverlay').style.display='flex';
}

function approveInbox(id){
  const req=inbox.find(r=>r.id===id); if(!req) return;
  req.status='approved';
  // Move to main offers
  const exists=offers.find(o=>o.id===id);
  if(!exists) offers.unshift({...req,createdAt:req.createdAt||Date.now()});
  toast('✅ تم الاعتماد ونقله للعروض الرئيسية','ok');
  closeOverlay('approveOverlay');
  save();
}
function rejectInbox(id){
  const req=inbox.find(r=>r.id===id); if(!req) return;
  req.status='rejected';
  toast('❌ تم رفض الطلب','info');
  closeOverlay('approveOverlay');
  save();
}
function clearProcessed(){
  inbox=inbox.filter(i=>i.status==='pending');
  toast('🗑️ تم حذف المعالجة','info');
  save();
}

function copyClientLink(){
  const url=window.location.origin+window.location.pathname.replace('index.html','')+'client.html';
  copyText(url);
  toast('✅ تم نسخ رابط النموذج');
}

// ── Stats tab ─────────────────────────────────────────────
function renderStats2(){
  if(!offers.length) return '<div class="empty"><div class="e-ic">📊</div><div class="e-t">لا توجد بيانات بعد</div></div>';
  const total=offers.length;
  const prices=offers.filter(o=>o.price).map(o=>numVal(o.price));
  const areas=offers.filter(o=>o.area&&o.price).map(o=>({p:numVal(o.price),a:Number(o.area)})).filter(z=>z.a>0);
  const avgPrice=prices.length?Math.round(prices.reduce((a,b)=>a+b,0)/prices.length):0;
  const maxPrice=prices.length?Math.max(...prices):0;
  const minPrice=prices.length?Math.min(...prices):0;
  const totalPortfolio=prices.reduce((a,b)=>a+b,0);
  const avgPricePerM=areas.length?Math.round(areas.reduce((s,z)=>s+(z.p/z.a),0)/areas.length):0;
  const byDir=DIRS.map(d=>({d,n:offers.filter(o=>o.direction===d).length}));
  const byType=TYPES.map(t=>({t,n:offers.filter(o=>o.propertyType===t).length})).filter(z=>z.n>0);
  const byCity=CITIES.map(c=>({c,n:offers.filter(o=>(o.city||'الرياض')===c).length})).filter(z=>z.n>0).sort((a,b)=>b.n-a.n);
  const negCount=offers.filter(o=>o.negotiable).length;

  let h='<div style="padding-bottom:18px"><div class="sec-title">📊 إحصائيات العروض</div>';

  // KPIs
  h+='<div class="kpi-grid">'
    +'<div class="kpi"><div class="kpi-n">'+total+'</div><div class="kpi-l">إجمالي العروض</div></div>'
    +'<div class="kpi"><div class="kpi-n" style="font-size:16px">'+fp(totalPortfolio)+'</div><div class="kpi-l">إجمالي المحفظة ﷼</div></div>'
    +'<div class="kpi"><div class="kpi-n" style="font-size:16px">'+fp(avgPricePerM)+'</div><div class="kpi-l">متوسط سعر المتر ﷼/م²</div></div>'
    +'<div class="kpi"><div class="kpi-n" style="color:#22c55e">'+negCount+'</div><div class="kpi-l">قابلة للتفاوض</div></div>'
    +'</div>';

  // Price stats
  if(prices.length){
    h+='<div style="background:var(--surf2);border-radius:12px;overflow:hidden;margin-bottom:12px">'
      +[['متوسط السعر',fp(avgPrice)],['أعلى سعر',fp(maxPrice)],['أقل سعر',fp(minPrice)]]
      .map(([k,v])=>'<div class="det-row" style="padding:10px 13px"><span class="det-k">'+k+'</span><span class="det-v" style="color:var(--gold)">'+v+' ﷼</span></div>').join('')
      +'</div>';
  }

  // By direction
  h+='<div style="font-size:12px;font-weight:800;color:var(--muted);margin-bottom:7px">توزيع الاتجاهات</div>'
    +'<div style="background:var(--surf2);border-radius:12px;overflow:hidden;margin-bottom:12px">';
  byDir.forEach(({d,n})=>{
    const c=DC[d],pct=total?Math.round(n/total*100):0;
    h+='<div class="bar-row"><span class="chip" style="background:'+c.badge+';width:38px;text-align:center;font-size:10px">'+d+'</span>'
      +'<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+c.badge+'"></div></div>'
      +'<span style="color:'+c.badge+';font-weight:800;font-size:12px;min-width:22px;text-align:left">'+n+'</span></div>';
  });
  h+='</div>';

  // By type
  if(byType.length){
    h+='<div style="font-size:12px;font-weight:800;color:var(--muted);margin-bottom:7px">حسب نوع العقار</div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px">';
    byType.forEach(({t,n})=>h+='<div style="background:var(--surf2);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center"><div style="font-size:18px;font-weight:900;color:var(--gold)">'+n+'</div><div style="color:var(--muted);font-size:10px;margin-top:2px">'+t+'</div></div>');
    h+='</div>';
  }

  // By city
  if(byCity.length){
    h+='<div style="font-size:12px;font-weight:800;color:var(--muted);margin-bottom:7px">حسب المدينة</div>'
      +'<div style="background:var(--surf2);border-radius:12px;overflow:hidden;margin-bottom:12px">';
    byCity.forEach(({c,n})=>{
      const pct=total?Math.round(n/total*100):0;
      h+='<div class="bar-row"><span style="font-size:11px;font-weight:800;color:#60a5fa;min-width:80px">'+c+'</span>'
        +'<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:#2563eb"></div></div>'
        +'<span style="color:#60a5fa;font-weight:800;font-size:12px;min-width:22px;text-align:left">'+n+'</span></div>';
    });
    h+='</div>';
  }

  h+='<button class="btn b-red" style="margin-top:4px;font-size:12px;padding:11px" onclick="clearAll()">🗑️ حذف جميع العروض</button></div>';
  return h;
}

// ── Export / Import ───────────────────────────────────────
function exportJSON(){
  const fil=filtered();
  if(!fil.length){toast('لا توجد بيانات للتصدير','err');return;}
  dl(JSON.stringify(fil,null,2),'application/json','عروض_عقارية_'+dateStr()+'.json');
  toast('📤 تم تصدير '+fil.length+' عرض JSON');
}
function openImport(){document.getElementById('importOverlay').style.display='flex';}
function doImport(input){
  const file=input.files[0];if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      let data=JSON.parse(e.target.result);
      if(!Array.isArray(data)) throw new Error();
      let added=0;
      const existingIds=new Set(offers.map(o=>o.id));
      data.forEach(item=>{
        if(typeof item!=='object'||item===null) return;
        if(item.id&&existingIds.has(item.id)) return;
        const newItem={...EF(),...item,id:item.id||gid()};
        offers.push(newItem);existingIds.add(newItem.id);added++;
      });
      save();closeOverlay('importOverlay');toast('✅ تمت إضافة '+added+' عرض جديد');
    }catch(err){toast('❌ ملف غير صالح','err');}
  };
  reader.readAsText(file,'utf-8');
}
function exportCSV(){
  const fil=filtered();
  if(!fil.length){toast('لا توجد بيانات','err');return;}
  const H=['المدينة','الاتجاه','اسم البائع','جوال البائع','الحي','نوع العقار','المساحة م²','عرض الشارع م','السعر ريال','قابل للتفاوض','ملاحظات'];
  const rows=fil.map(o=>[o.city||'الرياض',o.direction,o.sellerName,o.sellerPhone,o.neighborhood,o.propertyType,o.area,o.streetWidth,o.price,o.negotiable?'نعم':'لا',o.notes]);
  const csv='\uFEFF'+[H,...rows].map(r=>r.map(c=>'"'+(c||'').replace(/"/g,'""')+'"').join(',')).join('\n');
  dl(csv,'text/csv','عروض_عقارية_'+dateStr()+'.csv');
  toast('📊 تم تصدير '+fil.length+' عرض CSV');
}

// ── Helpers ───────────────────────────────────────────────
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function fp(v){const n=Number(String(v).replace(/,/g,''));return isNaN(n)?v:n.toLocaleString('ar-SA');}
function x(s){return s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function dl(content,type,name){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;a.click();}
function dateStr(){return new Date().toLocaleDateString('ar-SA').replace(/\//g,'-');}

init();
</script>
